[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "exo-brain-core-contracts"
version = "0.1.1"
description = "Provider-neutral runtime and envelope contracts for eXo-brain."
requires-python = ">=3.11"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
