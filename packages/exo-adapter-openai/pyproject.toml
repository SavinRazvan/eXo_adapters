[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "exo-adapter-openai"
version = "0.1.1"
description = "OpenAI runtime adapter package for eXo-brain."
requires-python = ">=3.11"
dependencies = [
    "exo-brain-core-contracts>=0.1.1,<0.2",
    "openai>=1.0.0",
    "openai-agents>=0.0.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
