[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "exo-brain-adapter-sdk"
version = "0.1.1"
description = "Adapter SDK helpers and conformance checks for eXo-brain adapters."
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["exo-brain-core-contracts>=0.1.1,<0.2"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
