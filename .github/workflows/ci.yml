# CI for eXo_adapters: install editable packages, run portability + package gates, pytest, smoke.
name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    # Declared so steps use env.EXO_PYPI_INDEX_URL (set below when optional repo var is set).
    env:
      EXO_PYPI_INDEX_URL: ""
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-ci.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Portability import guard
        run: python scripts/check_no_control_plane_imports.py

      - name: Validate adapter packages
        run: python scripts/architecture/validate_adapter_packages.py

      - name: Scan forbidden imports
        run: python scripts/architecture/scan_forbidden_imports.py

      - name: Pytest
        run: python -m pytest -q

      - name: Pytest coverage (packages, 100% gate)
        run: |
          python -m pytest -q \
            --cov=packages/exo-brain-core-contracts/src \
            --cov=packages/exo-brain-adapter-sdk/src \
            --cov=packages/exo-adapter-echo/src \
            --cov=packages/exo-adapter-openai/src \
            --cov-report=term-missing \
            --cov-fail-under=100

      - name: External install smoke
        run: python scripts/external_install_smoke.py

      - name: Dependency audit (advisory)
        run: |
          pip install pip-audit
          pip-audit -r requirements-ci.txt || true

      # Enable: repo variable EXO_PYPI_SMOKE=1; optional EXO_PYPI_INDEX_URL (default PyPI).
      - name: Apply optional PyPI index URL
        if: ${{ fromJSON(toJSON(vars)).EXO_PYPI_SMOKE == '1' }}
        run: |
          index_url='${{ fromJSON(toJSON(vars)).EXO_PYPI_INDEX_URL }}'
          if [ -n "$index_url" ]; then
            echo "EXO_PYPI_INDEX_URL=$index_url" >> "$GITHUB_ENV"
          fi

      - name: PyPI install smoke (optional)
        if: ${{ fromJSON(toJSON(vars)).EXO_PYPI_SMOKE == '1' }}
        env:
          EXO_ADAPTER_VERSION: "0.1.1"
          EXO_PYPI_EXTRA_INDEX_URL: https://pypi.org/simple/
        run: python scripts/pypi_install_smoke.py
