# CI for eXo_adapters: install editable packages, run portability + package gates, pytest, smoke.
name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-ci.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Portability import guard
        run: python scripts/check_no_control_plane_imports.py

      - name: Validate adapter packages
        run: python scripts/architecture/validate_adapter_packages.py

      - name: Scan forbidden imports
        run: python scripts/architecture/scan_forbidden_imports.py

      - name: Pytest with package coverage (100% gate)
        run: |
          python -m pytest -q \
            --cov=packages/exo-brain-core-contracts/src \
            --cov=packages/exo-brain-adapter-sdk/src \
            --cov=packages/exo-adapter-echo/src \
            --cov=packages/exo-adapter-openai/src \
            --cov-report=term-missing \
            --cov-fail-under=100

      - name: External install smoke
        run: python scripts/external_install_smoke.py

      - name: Dependency audit (advisory)
        run: |
          pip install pip-audit
          pip-audit -r requirements-ci.txt || true
